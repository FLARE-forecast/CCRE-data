name: ccre-generate-graphs

on:
  schedule:
    - cron: '00 06 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Generate Graphs"]
    types:
      - completed

jobs:
  generate-graphs:
    runs-on: self-hosted

    steps:
      - name: Checkout with ccre-generate-graphs branch
        uses: actions/checkout@v2
        with:
          ref: ccre-generate-graphs
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libwebp-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libuv1-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Set Up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'   

      - name: Create ~/rlib directory
        run: mkdir -p ~/rlib
      
      - name: Install R packages
        run: |
          rm -rf ~/rlib/00LOCK-*
          Rscript -e '
            .libPaths("~/rlib")
            install.packages("pacman", lib="~/rlib", repos="https://cloud.r-project.org")
            library(pacman)
            p_load(
              Rcpp,
              generics,
              lubridate,
              dplyr,
              ggplot2,
              tidyr,
              purrr,
              forcats,
              gridExtra,
              openair,
              magrittr,
              lib = "~/rlib"
            )
          '
        env:
          R_LIBS: ~/rlib

      - name: Run R Script
        run: Rscript ccre-generate-graphs.R
        env:
          R_LIBS: ~/rlib

      - name: Run R Script to make manager plot
        run: Rscript ccre-generate-managers-graphs.R
        env:
          R_LIBS: ~/rlib

      - name: Commit files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add \
            CCRMetDataFigures_$(date '+%Y-%m-%d').pdf \
            CCRWaterQualityDataFigures_$(date '+%Y-%m-%d').pdf \
            CCRWQ_Managers_DataFigures_$(date '+%Y-%m-%d').pdf \
            CCRE_EddyFluxDataFigures_$(date '+%Y-%m-%d').pdf
          git commit -m "ccre-generate-graphs-$(date '+%Y-%m-%d')"
          git branch -f ccre-graphs
          git push --force origin ccre-graphs
      
  send-mail:
    needs: generate-graphs
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send mail
        uses: dawidd6/action-send-mail@v2
        with:
          # mail server settings
          server_address: smtp.gmail.com
          server_port: 465
          # user credentials
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          # email subject
          subject: ${{ github.job }} job of ${{ github.repository }} has ${{ job.status }}
          # email body as text
          body: |
            ${{ github.job }} job in worflow ${{ github.workflow }} of ${{ github.repository }} has ${{ job.status }}
            The workflow link is https://github.com/FLARE-forecast/CCRE-data/actions/runs/${{ github.run_id }}
          # comma-separated string, send email to
          to: abreefpilz@vt.edu, vdaneshmand@acis.ufl.edu, zhuzeh@oregonstate.edu
          # to: zhuzeh@oregonstate.edu
          # from email name
          from: FLARE
